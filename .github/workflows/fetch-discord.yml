name: 🤖 Fetch Discord Assets

on:
  schedule:
    - cron: '*/5 * * * *'   # toutes les 5 minutes
  workflow_dispatch:          # déclenchement manuel

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install deps
        working-directory: scripts
        run: npm install

      - name: Fetch Discord assets
        run: node scripts/fetch.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          git config user.name  "discord-tracker[bot]"
          git config user.email "discord-tracker[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "::notice::Aucun changement"
          else
            CHANGES=$(git diff --staged --stat | tail -1)
            git commit -m "🤖 $(date -u '+%Y-%m-%d %H:%M UTC') · $CHANGES"
            git push
          fi
